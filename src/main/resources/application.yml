spring:
  application:
    name: price-tracker
  datasource:
    url: jdbc:mysql://localhost:3306/price_tracker?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5s}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: ${RABBITMQ_LISTENER_RETRY_MAX_ATTEMPTS:3}
          initial-interval: ${RABBITMQ_LISTENER_RETRY_INITIAL_INTERVAL:1s}
          multiplier: ${RABBITMQ_LISTENER_RETRY_MULTIPLIER:2}
          max-interval: ${RABBITMQ_LISTENER_RETRY_MAX_INTERVAL:10s}
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: change-me-to-a-secure-secret-key-123456
  access-token-expire-minutes: 120
  refresh-token-expire-days: 7
  issuer: price-tracker

rate-limit:
  default-limit: ${RATE_LIMIT_DEFAULT_LIMIT:60}
  default-window-seconds: ${RATE_LIMIT_DEFAULT_WINDOW_SECONDS:60}

notification:
  idempotent:
    ttl-minutes: ${NOTIFICATION_IDEMPOTENT_TTL_MINUTES:10}
  consumer-idempotent:
    ttl-minutes: ${NOTIFICATION_CONSUMER_IDEMPOTENT_TTL_MINUTES:30}

price-tracker:
  price-refresh:
    batch-size: ${PRICE_REFRESH_BATCH_SIZE:100}
