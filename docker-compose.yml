services:
  mysql:
    image: mysql:8.0
    container_name: price-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-price_tracker}
      MYSQL_USER: ${MYSQL_USER:-price_tracker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-price_tracker}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/sql/00_init_database.sql:/docker-entrypoint-initdb.d/00_init_database.sql:ro
      - ./src/main/resources/sql/tb_user.sql:/docker-entrypoint-initdb.d/10_tb_user.sql:ro
      - ./src/main/resources/sql/tb_product.sql:/docker-entrypoint-initdb.d/20_tb_product.sql:ro
      - ./src/main/resources/sql/tb_price_history.sql:/docker-entrypoint-initdb.d/30_tb_price_history.sql:ro
      - ./src/main/resources/sql/tb_watchlist.sql:/docker-entrypoint-initdb.d/40_tb_watchlist.sql:ro
      - ./src/main/resources/sql/tb_notification.sql:/docker-entrypoint-initdb.d/50_tb_notification.sql:ro
      - ./src/main/resources/sql/indexes.sql:/docker-entrypoint-initdb.d/90_indexes.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: price-tracker-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: price-tracker-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VIRTUAL_HOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
